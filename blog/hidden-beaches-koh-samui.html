    <p>Koh Samui's most famous beaches are well worth visiting — but sometimes you just want to find a stretch of sand where you are not fighting for space with a hundred other tourists. We have spent years tracking down the island's secret spots. This guide almost did not get published, and you will understand why once you visit them.</p>
    <div class="img-placeholder tall"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>Add hero image here (1200×600px recommended)</span></div>
    <h2>The Best Hidden Beaches</h2>
    <p>Ao Thong Ta Khian (Silver Beach) is the worst-kept secret on this list — it is becoming more popular but is still far quieter than Chaweng. Hin Ta and Hin Yai Beach near the famous rock formations is often overlooked because tourists stop for the rocks and miss the beach entirely. The small cove south of Coral Cove beach requires a short hike but rewards with almost guaranteed solitude.</p>

    <h2>How to Find the Hidden Beaches</h2>
    <p>Most of the truly hidden beaches are not accessible by car — you need a scooter and a willingness to take unmarked tracks. Google Maps satellite view is your best tool: look for areas of coastline without roads directly behind them and work backwards from there. Local fishermen often know spots that do not appear online at all — worth asking.</p>
    <div class="img-placeholder medium"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>Add supporting image here (800×500px)</span></div>
    <div class="info-box"><div class="info-box-icon">💡</div><p><strong>Insider Tip:</strong> The best time to visit any beach on the island is early morning before 9am — even the most popular spots feel deserted. Most tourists do not surface until 10 or 11am, which gives you a two-hour window of near-solitude even on Chaweng.</p></div>

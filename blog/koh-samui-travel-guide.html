    <p>Koh Samui is Thailand's second largest island and one of Southeast Asia's most visited destinations — but most tourists only scratch the surface. This guide covers everything you need to know before you go, from getting there to getting around, what things cost, and the honest tips that travel blogs usually leave out.</p>
    <div class="img-placeholder tall"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>Add hero image here (1200×600px recommended)</span></div>
    <h2>Getting to Koh Samui</h2>
    <p>Koh Samui Airport (USM) has direct flights from Bangkok (1 hour), Singapore, Hong Kong, and several other Asian hubs. Bangkok Airways operates a monopoly on many routes which keeps prices high — always check if flying via Surat Thani and taking the ferry is cheaper. The ferry from Don Sak pier takes about 90 minutes and is a great option if you are arriving from the mainland.</p>

    <h2>Getting Around Koh Samui</h2>
    <p>Renting a scooter (250–400 THB/day) is the best way to explore the island — traffic is manageable and most roads are in good condition. Songthaew (shared pickup trucks) run fixed routes and are the cheapest option. Grab (the Uber of Southeast Asia) works well in the main tourist areas. Taxis exist but are unmetered — always agree on the price before you get in.</p>
    <div class="img-placeholder medium"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>Add supporting image here (800×500px)</span></div>
    <div class="info-box"><div class="info-box-icon">💡</div><p><strong>Insider Tip:</strong> Rent a scooter on your first day, even if you are nervous — the island is best explored on two wheels and you will see far more than people who rely on taxis. Wear a helmet: police checkpoints are frequent and fines are real.</p></div>

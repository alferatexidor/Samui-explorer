    <p>Choosing where to stay in Koh Samui makes or breaks a trip. The island is bigger than it looks — about 228 square kilometres — and each area has a completely different vibe. Here's our honest breakdown by area, with our picks for every budget.</p>
    <div class="img-placeholder tall"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>Add hero image here (1200×600px recommended)</span></div>
    <h2>Best Areas to Stay in Koh Samui</h2>
    <p>Chaweng is the liveliest — great if you want beach, restaurants and nightlife within walking distance. Lamai is quieter but still has plenty going on. Bophut (Fisherman's Village) is our pick for couples — beautiful, calm, and the best restaurant strip on the island. Maenam suits families and those after real peace.</p>

    <h2>Best Hotels and Villas by Budget</h2>
    <p>Budget (under 1,500 THB/night): Plenty of guesthouses in Chaweng and Lamai. Mid-range (1,500–5,000 THB): Where Koh Samui really shines — boutique hotels with pools, good service. Luxury (5,000 THB+): Stunning clifftop and beachfront villas that rival anywhere in the world.</p>
    <div class="img-placeholder medium"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>Add supporting image here (800×500px)</span></div>
    <div class="info-box"><div class="info-box-icon">💡</div><p><strong>Insider Tip:</strong> Stay near the beach if it is your first visit to the island — getting around without a scooter or car is hard, and you will want easy beach access.</p></div>
